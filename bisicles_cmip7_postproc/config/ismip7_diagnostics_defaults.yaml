# bisicles_cmip7_postproc — ISMIP7 diagnostics workflow config
# =============================================================
# Runs the BISICLES diagnostics tool on standalone plot files and writes
# ISMIP7 DRS-named CF-compliant scalar timeseries NetCDF files.
#
# Output filenames follow the ISMIP7 DRS convention:
#   {varname}_{domain_id}_{source_id}_{ism_id}_{ism_member_id}_{esm_id}_{forcing_member_id}_{experiment}_{set_counter}_{startyr}-{endyr}.nc
# e.g.: lim_AIS_BristolGlaciology_BISICLES_m001_standalone_f001_ctrl_proj_C001_2015-2100.nc
#
# Usage:
#   bike-ismip7-postproc-run ismip7_diagnostics_defaults.yaml
#   bike-ismip7-postproc-diagnostics --config ismip7_diagnostics_defaults.yaml
#
# Copy this file, fill in the required fields (marked [required]), and run.
# Any option left as null will use the built-in default.

tool: diagnostics

# Enable ISMIP7 DRS output naming and CF-1.12 conventions.
# Always set to true when using this template.
ismip7_mode: true


# ---------------------------------------------------------------------------
# Input / output
# ---------------------------------------------------------------------------

# Path to a standalone BISICLES plot HDF5 file or a directory of plot files.
# Standalone BISICLES produces files named plot.NNNNNN.2d.hdf5. [required]
input: null

# Output directory for per-variable ISMIP7 NetCDF files.
# Defaults to the same directory as the input files if not set.
output_dir: null

# Glob pattern used to find plot files when 'input' is a directory.
plot_pattern: "plot.*.2d.hdf5"

# Print progress messages to stdout.
verbose: true


# ---------------------------------------------------------------------------
# Executables
# ---------------------------------------------------------------------------

# Full path to the BISICLES diagnostics executable. [required]
# Example: /path/to/bisicles-uob/code/filetools/diagnostics2d.Linux.64.g++.gfortran.OPT.ex
exe_path: null


# ---------------------------------------------------------------------------
# Time axis
# ---------------------------------------------------------------------------

# Reference year for the CF time axis.
# ISMIP7 requires time:units = "days since 1850-01-01", so this must be 1850.
reference_year: 1850

# CF calendar.  ISMIP7 requires "standard" (Gregorian-Julian as defined by UDUNITS).
# Use "360_day" only for UKESM-coupled runs with a 360-day model calendar.
calendar: standard

# ISMIP7 output frequency written to global attributes.
# Not included in the ISMIP7 filename but retained as a metadata attribute.
# Common values: yr, dec, mon
frequency: yr


# ---------------------------------------------------------------------------
# Physical constants
# ---------------------------------------------------------------------------

ice_density: 918.0
water_density: 1028.0
gravity: 9.81
h_min: 1.0


# ---------------------------------------------------------------------------
# Regional mask (optional)
# ---------------------------------------------------------------------------

# Path to an HDF5 mask file for regional diagnostics (e.g. drainage basins).
# Leave null to produce whole-ice-sheet diagnostics only.
mask_file: null

# First and last mask region indices to process (inclusive).
# Only used when mask_file is set.
mask_no_start: 0
mask_no_end: 0


# ---------------------------------------------------------------------------
# ISMIP7 DRS filename components
#
# Output filename pattern:
#   {variable}_{domain_id}_{source_id}_{ism_id}_{ism_member_id}_{esm_id}_{forcing_member_id}_{experiment}_{set_counter}_{startyr}-{endyr}.nc
# ---------------------------------------------------------------------------

# Modelling group name.  No underscores, dots or special characters. [required]
# Example: "BristolGlaciology"
source_id: ""

# Ice sheet model name and version.  No underscores, dots or special characters.
# Example: "BISICLES" or "BISICLESv3-2"
ism_id: "BISICLES"

# ISM choice variant identifier (mNNN format).
# Increment for each new initial state or ISM parameter choice.
ism_member_id: "m001"

# CMIP ESM used to produce forcing.  Use "standalone" for idealised/observed forcing.
# Example: "CESM2-WACCM", "MRI-ESM2-0", "ERA5", "standalone"
esm_id: "standalone"

# Forcing choice variant identifier (fNNN format).
# Increment for each new downscaling method or melt parameterisation.
forcing_member_id: "f001"

# Set counter (Cnnn for CORE, Ennn for ESM, Pnnn for PPE). [required]
# Links all files for a single model run in the submission spreadsheet.
# Example: "C001"
set_counter: "C001"

# Ice sheet identifier. [required]
#   GrIS  — Greenland Ice Sheet
#   AIS   — Antarctic Ice Sheet
ice_sheet: ""

# ISMIP7 experiment identifier. [required]
# Examples: ctrl_proj, historical, ssp126, ssp245, ssp370, ssp585
experiment: ""


# ---------------------------------------------------------------------------
# ISMIP7 mandatory global attributes
# ---------------------------------------------------------------------------

# Modelling group name (written as global attribute 'group').
# Can be left blank to default to source_id.
institution: ""

# Contact person name(s). [required for submission]
contact_name: ""

# Contact person email(s). [required for submission]
contact_email: ""

# Model source description.
source: "BISICLES adaptive mesh refinement ice sheet model"

# Additional global attributes as key-value pairs.
#
# Example ISMIP7-style attributes:
#   extra_attrs:
#     references: "https://doi.org/10.5194/gmd-xx-xxxx-xxxx"
#     comment: "Standalone BISICLES run for ISMIP7"
extra_attrs: null
